server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # ==================== 封面图目录 ====================
    location /covers/ {
        alias /usr/share/nginx/html/covers/;
        
        autoindex on;              # 开启目录浏览（像 Apache 一样）
        autoindex_exact_size off;  # 显示 KB/MB 格式
        autoindex_localtime on;    # 显示本地时间

        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=31536000";
    }

    # 根目录直接禁止访问（安全）
    location / {
        return 403;
    }
}