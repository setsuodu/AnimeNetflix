name: CI - Build & Docker (Tag Only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:     # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # 重要：让 git tag 信息可用

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Anime.Api/Anime.Api.csproj

      - name: Build
        run: dotnet build Anime.Api/Anime.Api.csproj --configuration Release --no-restore

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3   # 加上这一步更稳定

      # ====================== 新增：提取版本 ======================
      - name: Extract version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Docker Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/animenetflix:latest
            ghcr.io/${{ github.repository_owner }}/animenetflix:${{ github.ref_name }}
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          # 使用 registry 缓存（更快、更稳定）
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/animenetflix:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/animenetflix:buildcache,mode=max