name: Generate OpenAPI JSON

# 只在改 Anime.Api 时触发 + 支持手动触发
on:
  push:
    branches: [ main ]
    paths:
      - 'Anime.Api/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须有写权限才能把生成的 json push 回仓库

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # === 关键修复：直接 Publish 到固定目录，消灭路径不确定的问题 ===
      - name: Build and Publish Project
        run: |
          echo "=== 开始编译并发布项目 ==="
          dotnet publish Anime.Api/Anime.Api.csproj -c Release -o ./publish_output

      - name: Generate openapi.json
        run: |
          echo "=== 安装 Swashbuckle CLI ==="
          dotnet tool install --global Swashbuckle.AspNetCore.Cli --version 10.1.7 || true
          
          # 必须把 dotnet tools 加到环境变量，否则找不到 swagger 命令
          export PATH="$PATH:$HOME/.dotnet/tools"
          
          echo "=== 执行 swagger tofile ==="
          # 使用刚才 publish 出来的固定路径，拒绝猜路径
          swagger tofile --output openapi.json ./publish_output/Anime.Api.dll v1

      - name: Check if openapi.json exists
        run: |
          if [ -f "openapi.json" ]; then
            echo "✅ openapi.json 生成成功"
            ls -lh openapi.json
          else
            echo "❌ openapi.json 未生成"
            exit 1
          fi

      # === 自动将生成的 openapi.json 提交回仓库 ===
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add openapi.json
          # 如果文件没变化，git commit 会报错，这里加 || true 避免 workflow 挂掉
          git commit -m "chore: auto update openapi.json [skip ci]" || echo "No changes to commit"
          git push