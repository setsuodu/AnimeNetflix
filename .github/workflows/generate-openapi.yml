name: Generate OpenAPI JSON

on:
  push:
    branches: [ main ]
    paths:
      - 'Anime.Api/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # === 极简版：只 restore，不强求 build ===
      - name: Restore
        run: |
          dotnet restore

      # === 调试 DLL ===
      - name: Debug - List files
        run: |
          echo "=== 项目文件结构 ==="
          ls -la Anime.Api/
          find Anime.Api -name "*.csproj" || true
          echo "=== bin 目录 ==="
          ls -R Anime.Api/bin 2>/dev/null || echo "bin 目录不存在"

      # === 安装 CLI 并尝试生成 ===
      - name: Generate openapi.json
        run: |
          echo "=== 安装 Swashbuckle CLI ==="
          dotnet tool install --global Swashbuckle.AspNetCore.Cli --version 10.1.7 || true
          
          echo "=== 尝试生成 ==="
          # 先试常见路径
          dotnet swagger tofile --output openapi.json Anime.Api/bin/Debug/net10.0/Anime.Api.dll v1 || \
          dotnet swagger tofile --output openapi.json Anime.Api/bin/Release/net10.0/Anime.Api.dll v1 || \
          echo "❌ 所有路径都失败" && exit 1

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json || true
          git commit -m "chore: update openapi.json via CI [skip ci]" || echo "No changes"
          git push || true