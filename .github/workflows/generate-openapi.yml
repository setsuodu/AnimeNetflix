name: Generate OpenAPI JSON

# 只在改 Anime.Api 时触发 + 支持手动触发
on:
  push:
    branches: [ main ]
    paths:
      - 'Anime.Api/**'          # 只在改 Anime.Api 时触发
  workflow_dispatch:           # 手动触发测试

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # === 极简：只 restore，不 build ===
      - name: Restore
        run: |
          echo "=== dotnet restore 开始 ==="
          dotnet restore

      # === 调试：打印所有文件位置 ===
      - name: Debug - Show project structure
        run: |
          echo "=== 根目录文件 ==="
          ls -la
          echo "=== Anime.Api 目录 ==="
          ls -la Anime.Api/
          echo "=== 查找所有 dll ==="
          find . -name "*.dll" | head -20 || true
          echo "=== bin 目录详细 ==="
          ls -R Anime.Api/bin 2>/dev/null || echo "bin 目录不存在"

      # === 生成 openapi.json ===
      - name: Generate openapi.json
        run: |
          echo "=== 安装 Swashbuckle CLI ==="
          dotnet tool install --global Swashbuckle.AspNetCore.Cli --version 10.1.7 || true
          
          echo "=== 尝试生成 openapi.json ==="
          
          # 多个常见路径尝试
          dotnet swagger tofile --output openapi.json Anime.Api/bin/Debug/net10.0/Anime.Api.dll v1 || \
          dotnet swagger tofile --output openapi.json Anime.Api/bin/Release/net10.0/Anime.Api.dll v1 || \
          dotnet swagger tofile --output openapi.json Anime.Api/bin/Debug/net10.0/publish/Anime.Api.dll v1 || \
          dotnet swagger tofile --output openapi.json Anime.Api/bin/Release/net10.0/publish/Anime.Api.dll v1 || \
          echo "❌ 所有路径失败" && exit 1

      # === 提交 ===
      - name: Commit & Push openapi.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json || true
          git commit -m "chore: update openapi.json via CI [skip ci]" || echo "没有变化"
          git push || true