name: Generate OpenAPI JSON

on:
  push:
    branches: [ main ]
    paths:
      - 'Anime.Api/**'          # 只在改 Anime.Api 时触发
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Swashbuckle CLI
        run: dotnet tool install --global Swashbuckle.AspNetCore.Cli || echo "Already installed"

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build Anime.Api/Anime.Api.csproj --configuration Release

      - name: Generate openapi.json
        run: |
          dotnet swagger tofile --output openapi.json Anime.Api/bin/Release/net10.0/Anime.Api.dll v1

      - name: Commit & Push openapi.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json
          git commit -m "chore: update openapi.json" || echo "No changes to commit"
          git push