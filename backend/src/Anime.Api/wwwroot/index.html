<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的私人番剧站（666）</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #141414;
            color: white;
        }

        .anime-card {
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .anime-card:hover {
            transform: scale(1.05);
            color: #ff679a;
        }

        .anime-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            background: #222;
        }

        .anime-title {
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
            height: 40px;
            overflow: hidden;
        }

        /* 角标：集数 */
        .anime-card-wrap {
            position: relative;
        }

        .badge-ep {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0,0,0,0.72);
            color: #ff679a;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 10px;
            pointer-events: none;
        }

        /* 筛选区 */
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 18px;
        }

        .filter-bar select {
            background: #1f1f1f;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 13px;
        }

        .filter-bar select:focus {
            outline: none;
            border-color: #ff679a;
        }

        .btn-more {
            background: #ff679a;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="text-danger">最新更新</h3>
            <input id="search" class="form-control w-25 bg-dark text-white border-secondary" placeholder="搜索...">
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <select id="filter-year">
                <option value="">全部年份</option>
            </select>
            <select id="filter-area">
                <option value="">全部地区</option>
            </select>
            <select id="filter-category">
                <option value="">全部类型</option>
            </select>
        </div>

        <div class="row" id="list"></div>

        <div class="text-center my-5">
            <button id="loadMore" class="btn-more">查看更多 (加载中...)</button>
        </div>
    </div>

    <script>
        let page = 1;
        const listDiv = document.getElementById('list');
        const searchInput = document.getElementById('search');
        const loadMoreBtn = document.getElementById('loadMore');
        const filterYear = document.getElementById('filter-year');
        const filterArea = document.getElementById('filter-area');
        const filterCategory = document.getElementById('filter-category');

        // 初始化下拉筛选选项（从后端获取或固定）
        async function initFilters() {
            try {
                const res = await fetch('/api/netflix/filters');
                if (!res.ok) return;
                const data = await res.json();

                (data.years || []).sort((a, b) => b - a).forEach(y => {
                    filterYear.innerHTML += `<option value="${y}">${y}年</option>`;
                });
                (data.areas || []).forEach(a => {
                    filterArea.innerHTML += `<option value="${a}">${a}</option>`;
                });
                (data.categories || []).forEach(c => {
                    filterCategory.innerHTML += `<option value="${c}">${c}</option>`;
                });
            } catch (e) {
                // 筛选接口不存在时静默失败，不影响主列表
                console.warn('筛选数据加载失败', e);
            }
        }

        function getQuery() {
            const params = new URLSearchParams({
                page,
                pageSize: 30,
                search: searchInput.value,
            });
            if (filterYear.value) params.set('year', filterYear.value);
            if (filterArea.value) params.set('area', filterArea.value);
            if (filterCategory.value) params.set('category', filterCategory.value);
            return params.toString();
        }

        async function fetchAnimes(isAppend = false) {
            loadMoreBtn.innerText = '加载中...';
            const res = await fetch(`/api/netflix?${getQuery()}`);
            const data = await res.json();

            const html = data.map(item => `
                <div class="col-6 col-md-3 col-lg-2">
                    <div class="anime-card" onclick="location.href='detail.html?id=${encodeURIComponent(item.sourceFingerprint)}'">
                        <div class="anime-card-wrap">
                            <img
                                src="http://192.168.1.198:8061/${item.coverUrl || ''}"
                                onerror="this.src='/images/default_cover.jpg';"
                            >
                            ${item.episodes ? `<span class="badge-ep">${item.episodes}</span>` : ''}
                        </div>
                        <div class="anime-title" title="${item.title}">${item.title}</div>
                    </div>
                </div>
            `).join('');

            if (isAppend) listDiv.innerHTML += html;
            else listDiv.innerHTML = html;

            loadMoreBtn.innerText = data.length < 30 ? '没有更多了' : '查看更多';
        }

        function resetAndFetch() {
            page = 1;
            fetchAnimes(false);
        }

        loadMoreBtn.onclick = () => {
            page++;
            fetchAnimes(true);
        };

        searchInput.oninput = resetAndFetch;
        filterYear.onchange = resetAndFetch;
        filterArea.onchange = resetAndFetch;
        filterCategory.onchange = resetAndFetch;

        initFilters();
        fetchAnimes();
    </script>
</body>
</html>
