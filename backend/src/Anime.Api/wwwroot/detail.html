<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>播放详情 - 家庭版 Netflix</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    <style>
        body {
            background: #141414;
            color: white;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #dplayer {
            width: 100%;
            height: 550px;
        }

        /* 番剧元信息 */
        .anime-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .meta-tag {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 10px;
            background: #2b2b2b;
            color: #aaa;
            border: 1px solid #3a3a3a;
        }

        .meta-tag.highlight {
            background: #2a1a1a;
            color: #ff679a;
            border-color: #5a2030;
        }

        /* 副标题（日/英文名） */
        .sub-titles {
            font-size: 12px;
            color: #666;
            margin-top: 3px;
        }

        /* 播放源标签 */
        .source-tabs {
            margin-top: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .src-btn {
            margin-right: 10px;
            border-radius: 20px;
            padding: 5px 20px;
            font-size: 14px;
            transition: 0.3s;
        }

        .active-source {
            background: #e50914 !important;
            border-color: #e50914 !important;
            color: white !important;
        }

        /* 集数列表 */
        .ep-list-wrapper {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .ep-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .ep-btn {
            background: #2b2b2b;
            border: 1px solid #444;
            color: #ccc;
            padding: 8px 5px;
            font-size: 13px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .ep-btn:hover {
            background: #3d3d3d;
            color: #fff;
            border-color: #666;
        }

        .active-ep {
            background: #e50914 !important;
            color: white !important;
            border-color: #e50914 !important;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4);
        }

        .anime-info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .back-link {
            text-decoration: none;
            color: #aaa;
            font-size: 14px;
            transition: 0.3s;
            white-space: nowrap;
            margin-top: 4px;
        }

        .back-link:hover {
            color: #fff;
        }

        .title-block {
            max-width: 75%;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <!-- 顶部导航 -->
    <div class="anime-info-header">
        <a href="index.html" class="back-link">← 返回首页</a>
        <div class="title-block text-end">
            <h4 id="anime-title" class="text-truncate mb-1">正在加载...</h4>
            <!-- 日文名 / 英文名 -->
            <div id="anime-sub-titles" class="sub-titles"></div>
            <!-- 元信息标签：年份、地区、类型、集数 -->
            <div id="anime-meta" class="anime-meta justify-content-end"></div>
        </div>
    </div>

    <!-- 播放器 -->
    <div class="video-container">
        <div id="dplayer"></div>
    </div>

    <!-- 播放源切换 -->
    <div class="source-tabs">
        <button id="btn-src1" class="btn btn-outline-secondary src-btn active-source" onclick="switchSource(1)">线路一 (主线)</button>
        <button id="btn-src2" class="btn btn-outline-secondary src-btn" onclick="switchSource(2)">线路二 (备用)</button>
    </div>

    <!-- 集数选择 -->
    <div class="ep-list-wrapper">
        <div class="d-flex justify-content-between align-items-center">
            <h6 class="mb-0">剧集列表</h6>
            <small id="ep-count" class="text-secondary">共 0 集</small>
        </div>
        <div id="ep-grid" class="ep-grid"></div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(location.search);
    // 主键已由 int id 改为 string sourceFingerprint
    const animeId = urlParams.get('id');
    let animeData = null;
    let dp = null;

    async function init() {
        if (!animeId) {
            alert("未找到番剧 ID");
            location.href = 'index.html';
            return;
        }

        try {
            const res = await fetch(`/api/netflix/${encodeURIComponent(animeId)}`);
            if (!res.ok) throw new Error("获取详情失败");
            animeData = await res.json();

            // 主标题
            document.getElementById('anime-title').innerText = animeData.title;
            document.title = `${animeData.title} - 在线播放`;

            // 副标题：日文名 / 英文名
            const subParts = [
                animeData.japaneseTitle,
                animeData.englishTitle
            ].filter(Boolean);
            const subEl = document.getElementById('anime-sub-titles');
            subEl.innerText = subParts.join(' / ');

            // 元信息标签
            const metaEl = document.getElementById('anime-meta');
            const tags = [
                { value: animeData.year,     label: `${animeData.year}年`,   cls: '' },
                { value: animeData.area,     label: animeData.area,          cls: '' },
                { value: animeData.category, label: animeData.category,      cls: '' },
                { value: animeData.episodes, label: animeData.episodes,      cls: 'highlight' },
            ];
            metaEl.innerHTML = tags
                .filter(t => t.value)
                .map(t => `<span class="meta-tag ${t.cls}">${t.label}</span>`)
                .join('');

            // 默认加载线路 1
            switchSource(1);
        } catch (err) {
            console.error(err);
            document.getElementById('anime-title').innerText = "加载失败，请检查数据库连接";
        }
    }

    function switchSource(srcNum) {
        document.getElementById('btn-src1').classList.toggle('active-source', srcNum === 1);
        document.getElementById('btn-src2').classList.toggle('active-source', srcNum === 2);

        const rawData = srcNum === 1 ? animeData.playUrls : animeData.backupUrls;
        const grid = document.getElementById('ep-grid');

        if (!rawData || rawData.trim() === "") {
            grid.innerHTML = '<div class="text-secondary p-3">该线路暂无可用资源</div>';
            document.getElementById('ep-count').innerText = "共 0 集";
            return;
        }

        // 格式: 第01集$url#第02集$url
        const episodes = rawData.split('#').filter(x => x.includes('$')).map(item => {
            const parts = item.split('$');
            return { name: parts[0], url: parts[1] };
        });

        document.getElementById('ep-count').innerText = `共 ${episodes.length} 集`;

        grid.innerHTML = episodes.map((ep) => `
            <div class="ep-btn" onclick="playVideo('${ep.url}', this)">${ep.name}</div>
        `).join('');

        if (episodes.length > 0) {
            playVideo(episodes[0].url, grid.firstElementChild);
        }
    }

    function playVideo(videoUrl, element) {
        document.querySelectorAll('.ep-btn').forEach(btn => btn.classList.remove('active-ep'));
        if (element) element.classList.add('active-ep');

        if (dp) dp.destroy();

        dp = new DPlayer({
            container: document.getElementById('dplayer'),
            autoplay: true,
            theme: '#e50914',
            loop: false,
            lang: 'zh-cn',
            screenshot: true,
            hotkey: true,
            video: {
                url: videoUrl,
                type: 'hls'
            }
        });

        dp.on('error', function () {
            console.log('视频加载失败，请尝试切换线路');
        });
    }

    init();
</script>

</body>
</html>
